services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: webbuchhaltung
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/webbuchhaltung
      # SECURITY: Override SECRET_KEY via .env or Docker secret before deploying.
      # Never use this placeholder value in any non-local environment.
      SECRET_KEY: changeme-in-production
      STORAGE_BACKEND: local
      # First-run bootstrap (optional): set these to auto-create the first admin on startup.
      # Use a .env file or Docker secret — never commit credentials here.
      # BOOTSTRAP_ADMIN_EMAIL: admin@mycompany.de
      # BOOTSTRAP_ADMIN_PASSWORD: changeme
      # BOOTSTRAP_MANDANT_NAME: Meine GmbH
      # BOOTSTRAP_SKR_VARIANT: skr03
    depends_on:
      db:
        condition: service_healthy
    # Development-only volume mount for hot-reload. Remove for production builds.
    volumes:
      - ./backend:/app
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir app

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
